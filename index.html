<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gurjot Singh - Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.3s ease;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .download-btn {
            background: #28a745;
        }
        
        .download-btn:hover {
            background: #218838;
        }
        
        .pdf-container {
            background: white;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .pdf-viewer {
            width: 100%;
            height: 90vh;
            border: none;
        }
        
        .fallback {
            padding: 40px;
            text-align: center;
            color: #666;
        }
        
        .fallback a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .fallback a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .controls {
                flex-direction: column;
                gap: 15px;
            }
            
            .pdf-viewer {
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gurjot Singh</h1>
            <p class="subtitle">Resume</p>
        </header>
        
        <div class="controls">
            <div class="button-group">
                <button onclick="document.getElementById('pdfViewer').requestFullscreen(); this.blur();">📖 Fullscreen</button>
            </div>
            <a href="resume.pdf" download style="color: #28a745; text-decoration: none;">
                <button class="download-btn">⬇️ Download PDF</button>
            </a>
        </div>
        
        <div class="pdf-container">
            <iframe 
                id="pdfViewer"
                class="pdf-viewer" 
                src="resume.pdf#toolbar=1&navpanes=0&scrollbar=1" 
                type="application/pdf">
            </iframe>
            
            <div class="fallback" style="display: none;">
                <p>Your browser doesn't support PDF viewing. </p>
                <p><a href="resume.pdf" download>Download your resume here</a></p>
            </div>
        </div>
    </div>
